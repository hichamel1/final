<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="./accet/logo.png">
    <title>تواصل معنا - جمعية النصر المرنيسي</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #eef5ff;
            --accent-color: #007bff;
            --light-color: #ffffff;
            --dark-blue-hover: #004085;
            --text-color: #333;
            --text-color-light: #f8f9fa;
            --text-secondary: #555;
            --transition-speed: 0.3s ease;
            --footer-bg: #003d80;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: var(--secondary-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
        }

        .contact-section {
            background-color: var(--secondary-color);
            padding: 0rem 1rem;
            color: var(--text-color);
            margin: 2rem auto;
            max-width: 1200px;
        }

        .contact-container {
            width: 90%;
            margin: 0 auto;
        }

        .contact-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        .contact-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .contact-card {
            background-color: var(--light-color);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
        }

        .contact-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0, 86, 179, 0.15);
        }

        .info-card {
            text-align: center;
        }

        .info-card h3 {
            color: var(--primary-color);
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        .info-card p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .icon-box {
            background-color: var(--accent-color);
            color: var(--light-color);
            width: 60px;
            height: 60px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ced4da;
            background-color: #f8f9fa;
            color: var(--text-color);
            border-radius: 6px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: var(--light-color);
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color var(--transition-speed), transform var(--transition-speed);
        }

        .submit-btn:hover {
            background-color: var(--dark-blue-hover);
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #form-message-container {
            padding: 15px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
            border-radius: 8px;
            font-size: 1.1em;
            border-width: 2px;
            border-style: solid;
            display: none;
        }

        #form-message-container.success {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
            display: block;
        }

        #form-message-container.error {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
            display: block;
        }

        @media (max-width: 768px) {
            .contact-title {
                font-size: 2rem;
            }
            .contact-grid {
                grid-template-columns: 1fr;
            }
            .contact-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- ========== NAVBAR CONTAINER ========== -->
    <div id="navbar-container"></div>

    <main>
        <section class="contact-section">
            <div class="contact-container">
                <h2 class="contact-title">تواصل معنا</h2>
                <p class="contact-subtitle">نحن هنا للإجابة على استفساراتك ودعم مجتمعنا الرياضي</p>

                <div class="contact-grid">
                    <!-- بطاقة المعلومات -->
                    <div class="contact-card info-card">
                        <div class="icon-box"><i class="fas fa-map-marker-alt"></i></div>
                        <h3>مقر الجمعية</h3>
                        <p>دار الشباب طهر السوق، المرنيسي</p>
                        <div class="icon-box"><i class="fas fa-phone"></i></div>
                        <h3>الهاتف</h3>
                        <p>+212 6XX XXX XXX</p>
                        <div class="icon-box"><i class="fas fa-envelope"></i></div>
                        <h3>البريد الإلكتروني</h3>
                        <p>contact@alnasr-mernissi.ma</p>
                    </div>

                    <!-- بطاقة النموذج -->
                    <div class="contact-card form-card">
                        <form class="contact-form" id="contactForm" novalidate>
                            <!-- رسالة النجاح/الخطأ -->
                            <div id="form-message-container"></div>

                            <div class="form-group">
                                <input type="text" id="name" name="name" placeholder="اسمك الكامل" required>
                            </div>
                            <div class="form-group">
                                <input type="email" id="email" name="email" placeholder="بريدك الإلكتروني" required>
                            </div>
                            <div class="form-group">
                                <input type="tel" id="phone" name="phone" placeholder="رقم الهاتف (اختياري)">
                            </div>
                            <div class="form-group">
                                <textarea id="message" name="message" rows="5" placeholder="رسالتك..." required></textarea>
                            </div>
                            <button type="submit" class="submit-btn" id="submitBtn">
                                <span id="submitText">إرسال الرسالة</span>
                                <span id="submitSpinner" style="display:none;">
                                    <i class="fas fa-spinner fa-spin"></i> جاري الإرسال...
                                </span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ========== FOOTER CONTAINER ========== -->
    <div id="footer-container"></div>

    <!-- ========== JAVASCRIPT ========== -->
    <script>
        // ========== دالة تحميل ملفات HTML ==========
        async function loadHTML(elementId, filePath) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.text();
                const container = document.getElementById(elementId);
                container.innerHTML = data;

                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    newScript.textContent = oldScript.textContent;
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                console.log(`✅ تم تحميل ${filePath} بنجاح`);
            } catch (error) {
                console.error(`❌ خطأ في تحميل ${filePath}:`, error);
                document.getElementById(elementId).innerHTML = `
                    <div style="background:#ff4444;color:white;padding:15px;text-align:center;margin:10px 20px;border-radius:8px;">
                        ⚠️ تعذر تحميل ${filePath}. تأكد من وجود الملف.
                    </div>
                `;
            }
        }

        // ========== تحميل Navbar و Footer ==========
        loadHTML('navbar-container', 'navbar.html');
        loadHTML('footer-container', 'footer.html');

        // ========== التعامل مع نموذج الاتصال ==========
        document.addEventListener('DOMContentLoaded', function() {
            const contactForm = document.getElementById('contactForm');
            const formMessageContainer = document.getElementById('form-message-container');
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');

            // دالة عرض رسالة
            function showFormMessage(type, message) {
                formMessageContainer.className = type;
                formMessageContainer.textContent = message;
                formMessageContainer.style.display = 'block';

                // إخفاء الرسالة بعد 5 ثواني
                setTimeout(() => {
                    formMessageContainer.style.display = 'none';
                }, 5000);
            }

            // دالة إخفاء الرسالة
            function hideFormMessage() {
                formMessageContainer.style.display = 'none';
            }

            // دالة تعطيل/تفعيل النموذج
            function setFormLoading(isLoading) {
                const inputs = contactForm.querySelectorAll('input, textarea, button');
                inputs.forEach(input => {
                    input.disabled = isLoading;
                });

                if (isLoading) {
                    submitText.style.display = 'none';
                    submitSpinner.style.display = 'inline';
                } else {
                    submitText.style.display = 'inline';
                    submitSpinner.style.display = 'none';
                }
            }

            // دالة التحقق من صحة البريد الإلكتروني
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            // معالجة تقديم النموذج
            contactForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideFormMessage();

                // جمع البيانات
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const message = document.getElementById('message').value.trim();

                // التحقق من صحة البيانات
                if (!name || !email || !message) {
                    showFormMessage('error', '⚠️ المرجو ملء جميع الحقول الإلزامية (الاسم، البريد الإلكتروني، الرسالة).');
                    return;
                }

                if (!isValidEmail(email)) {
                    showFormMessage('error', '⚠️ المرجو إدخال عنوان بريد إلكتروني صحيح.');
                    return;
                }

                if (message.length < 10) {
                    showFormMessage('error', '⚠️ يجب أن تحتوي الرسالة على 10 أحرف على الأقل.');
                    return;
                }

                // تفعيل حالة التحميل
                setFormLoading(true);

                try {
                    // محاكاة إرسال البيانات (تقدر تبدّلها بـ fetch حقيقي)
                    // ========== للاستخدام مع سيرفر حقيقي، علّق على المحاكاة وفعّل fetch ==========

                    // ---- محاكاة الإرسال (احذف هذا الجزء عند الاتصال بسيرفر حقيقي) ----
                    await new Promise((resolve) => setTimeout(resolve, 1500));

                    // محاكاة نجاح
                    const simulatedSuccess = true; // بدّل لـ false باش تحاكي فشل

                    if (simulatedSuccess) {
                        showFormMessage('success', '✅ تم إرسال رسالتك بنجاح! سنتواصل معك قريباً.');
                        contactForm.reset();
                    } else {
                        throw new Error('فشل في إرسال الرسالة. المرجو المحاولة لاحقاً.');
                    }
                    // ---- نهاية المحاكاة ----

                    // ---- للاستخدام مع سيرفر حقيقي (فعّل هذا الجزء) ----
                    /*
                    const response = await fetch('your-server-endpoint.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            name: name,
                            email: email,
                            phone: phone,
                            message: message
                        })
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        showFormMessage('success', '✅ تم إرسال رسالتك بنجاح! سنتواصل معك قريباً.');
                        contactForm.reset();
                    } else {
                        throw new Error(result.message || 'فشل في إرسال الرسالة. المرجو المحاولة لاحقاً.');
                    }
                    */

                } catch (error) {
                    showFormMessage('error', `❌ ${error.message || 'حدث خطأ غير متوقع. المرجو المحاولة لاحقاً.'}`);
                } finally {
                    setFormLoading(false);
                }
            });
        });
    </script>

</body>

</html>
